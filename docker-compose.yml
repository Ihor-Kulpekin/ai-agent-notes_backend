version: '3.9'

services:
  redis:
    image: redis/redis-stack:latest
    container_name: notesqa-redis
    restart: unless-stopped
    ports:
      - '6379:6379'   # Redis DB
      - '8001:8001'   # RedisInsight UI → http://localhost:8001
    volumes:
      - redis_data:/data
    environment:
      - REDIS_ARGS=--save 60 1 --loglevel warning
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
    driver: local
